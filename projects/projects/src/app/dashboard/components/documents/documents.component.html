<h5 class="mt-4 ms-4">
    <span>Documents</span>
    <!-- <span class="close-btn-nav" (click)="closeButton($event)"><i class="icon-close"></i></span> -->
</h5>

<div class="mt-3 container">
    <div class="search-section">
        <input type="text" class="document-search-input" placeholder="Search documents by name" [(ngModel)]="searchText"
            (input)="onSearchChange()" />
        <button class="document-clear-btn" *ngIf="searchText" (click)="clearSearch()">
            Clear
        </button>
    </div>

    <div class="d-flex flex-md-wrap" *ngIf="filteredDocuments.length; else emptyDocumentMessage">
        <div class="m-4 document-name-card" *ngFor="let document of filteredDocuments"
            (click)="onClickDocument(document)" [title]="getDocumentDisplayName(document)">
            <!-- <div class="document-icon">
                <i class="icon-file-text"></i>
            </div> -->
            <div class="document-name">
                {{ getDocumentDisplayName(document) }}
            </div>
        </div>
    </div>
</div>

<ng-template #emptyDocumentMessage>
    <div class="ms-4 mb-5 empty-document-message">No Documents Found</div>
</ng-template>
