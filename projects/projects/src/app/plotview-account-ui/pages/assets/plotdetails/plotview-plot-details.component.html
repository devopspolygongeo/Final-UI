<!-- WRAP BOTH COLUMNS IN .main-content -->
<div class="main-content">
  <!-- LEFT -->
  <div class="left-section" #leftCol>
    <ng-container *ngIf="mapConfig; else noMap">
<app-map
  #mapCmp
  [mapConfig]="mapConfig"
  [disableFilters]="true"
  [plotviewMode]="true"
  [showLandmarks]="false"
  [enableTerrain]="is3D"
  (mapMouseEv)="onMapMouseEvents($event)"
>
</app-map>
    </ng-container>

    <ng-template #noMap>
      <div style="
          height: 70vh;
          min-height: 520px;
          display: flex;
          align-items: center;
          justify-content: center;
          border: 1px dashed #ddd;
          border-radius: 8px;
          color: #888;
        ">
        No mapConfig (waiting for data)…
      </div>
    </ng-template>
  </div>

  <!-- RIGHT -->
  <div class="right-section">
    <div class="right-form-card">
      <div *ngIf="!isPlotSelected" style="color: #999; margin-bottom: 10px;">
        Please select a plot on the map or search to enable editing.
      </div>

      <!-- SEARCH -->
      <div class="form-group">
        <label>Search Plot</label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input class="form-control" [(ngModel)]="searchPlotNo" (keydown.enter)="onSearchPlotEnter($event)"
            placeholder="Enter plot number" />
          <button type="button" class="save-btn" [disabled]="isSearchingPlot" (click)="onSearchPlot()"
            style="min-width: 110px">
            {{ isSearchingPlot ? 'Searching...' : 'Search Plot' }}
          </button>
        </div>
      </div>

      <!-- PLOT NO -->
      <div class="form-group">
        <label>Plot No</label>
        <input class="form-control" [(ngModel)]="plotModel.plotNo" (ngModelChange)="markDirty()"
          [disabled]="!isPlotSelected" />
      </div>

      <!-- DOC NO -->
      <div class="form-group">
        <label>Doc No</label>
        <input class="form-control" [(ngModel)]="plotModel.doc_no" (ngModelChange)="markDirty()"
          [disabled]="!isPlotSelected" />
      </div>

            <!-- SALES CONSIDERATION -->
<div class="form-group">
  <label>Sales Consideration</label>
  <input
    class="form-control"
    [(ngModel)]="plotModel.Sales_Consideration"
    (ngModelChange)="markDirty()"
    [disabled]="!isPlotSelected"
    placeholder="Enter sales consideration"
  />
</div>

      <!-- SALE STATUS -->
      <div class="form-group">
        <label>Sale Status</label>
        <div class="select-wrapper">
          <select class="form-control" [(ngModel)]="plotModel.salestatus" (ngModelChange)="markDirty()"
            [disabled]="!isPlotSelected">
            <option *ngFor="let s of saleStatusOptions" [ngValue]="s">
              {{ s }}
            </option>
          </select>

          <span class="select-caret" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </span>
        </div>
      </div>

      <!-- FACING -->
      <!-- <div class="form-group">
        <label>Facing</label>
        <input class="form-control" [(ngModel)]="plotModel.facing" (ngModelChange)="markDirty()"
          [disabled]="!isPlotSelected" />
      </div> -->

      <!-- OWNER -->
      <div class="form-group">
        <label>Owner</label>
        <input class="form-control" [(ngModel)]="plotModel.ownername" (ngModelChange)="markDirty()"
          [disabled]="!isPlotSelected" list="owners-suggestions" placeholder="Enter owner name" autocomplete="off" />
        <datalist id="owners-suggestions">
          <option *ngFor="let o of ownersList" [value]="o"></option>
        </datalist>
      </div>

      <!-- DEVELOPER -->
      <div class="form-group">
        <label>Developer</label>
        <input class="form-control" [(ngModel)]="plotModel.Developer" (ngModelChange)="markDirty()"
          [disabled]="!isPlotSelected" list="developers-suggestions" placeholder="Enter developer name"
          autocomplete="off" />
        <datalist id="developers-suggestions">
          <option *ngFor="let d of developersList" [value]="d"></option>
        </datalist>
      </div>



      <!-- PRICE -->
      <!-- <div class="form-group">
        <label>Price Range</label>
        <div class="price-range-container">
          <div class="price-inputs">
            <input class="price-input" placeholder="Min" [(ngModel)]="plotModel.priceMin" (ngModelChange)="markDirty()"
              [disabled]="!isPlotSelected" />
            <input class="price-input" placeholder="Max" [(ngModel)]="plotModel.priceMax" (ngModelChange)="markDirty()"
              [disabled]="!isPlotSelected" />
            <div class="price-unit-dropdown">
              <div class="dropdown-input">
                <span>{{ plotModel.priceUnit }}</span>
              </div>
            </div>
          </div>
        </div>
      </div> -->

      <!-- SAVE -->
      <div class="actions-row">
        <button class="save-btn" [disabled]="!isDirty || !isPlotSelected" (click)="onSave()">
          Save
        </button>
      </div>
    </div>
  </div>
</div>
