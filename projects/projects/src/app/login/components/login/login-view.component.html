<div id="login">
   <mat-card class="login-form">
      <div class="logo-image" style="text-align: center; margin-bottom: 1.5rem">
         <img [src]="logoPath" alt="Logo" />
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="submit()">
         <mat-form-field appearance="fill">
            <input matInput type="text" placeholder="Email" formControlName="userName" />
         </mat-form-field>

         <mat-form-field appearance="fill">
            <input matInput type="password" placeholder="Password" formControlName="password" />
         </mat-form-field>

         <!-- <div class="target-field">
            <label for="loginTarget" class="target-label">Login to</label>
            <select id="loginTarget" formControlName="loginTarget" class="target-select">
               <option value="">Use requested page</option>
               <option *ngFor="let item of loginTargets" [value]="item.value">
                  {{ item.label }}
               </option>
            </select>
         </div> -->

         <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
         </div>

         <div style="display: flex; justify-content: center; margin-top: 1.5rem">
            <button mat-raised-button color="primary" type="submit" class="login-button">
               Login
            </button>
         </div>
      </form>
   </mat-card>
</div>
